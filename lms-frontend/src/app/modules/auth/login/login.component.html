<div class="login-page">
  <div class="login-card" style="max-width: 460px;">

    <!-- Logo -->
    <div class="login-logo">
      <div class="logo-circle">🚚</div>
      <h1>Smart LMS</h1>
      <p>Logistics Management System</p>
    </div>

    <!-- Step 1: Role Selector -->
    <div *ngIf="!selectedRole">
      <p style="text-align: center; font-size: 14px; font-weight: 600; color: #374151; margin-bottom: 16px;">
        Select your role to continue
      </p>
      <div style="display: flex; flex-direction: column; gap: 12px;">
        <div *ngFor="let role of roles"
             (click)="selectRole(role)"
             style="display: flex; align-items: center; gap: 16px; padding: 16px 20px; border: 2px solid #E2E8F0; border-radius: 12px; cursor: pointer; transition: all 0.2s ease; background: white;"
             (mouseenter)="hoveredRole = role.key" (mouseleave)="hoveredRole = ''"
             [style.border-color]="hoveredRole === role.key ? '#2563EB' : '#E2E8F0'"
             [style.background]="hoveredRole === role.key ? '#EFF6FF' : 'white'"
             [style.transform]="hoveredRole === role.key ? 'translateX(4px)' : 'none'">
          <div style="width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0;"
               [style.background]="role.bg">
            {{ role.icon }}
          </div>
          <div>
            <div style="font-size: 15px; font-weight: 700; color: #1B2A4A;">{{ role.label }}</div>
            <div style="font-size: 12px; color: #64748B; margin-top: 2px;">{{ role.description }}</div>
          </div>
          <div style="margin-left: auto; color: #94A3B8; font-size: 18px;">›</div>
        </div>
      </div>
    </div>

    <!-- Step 2: Login Form -->
    <div *ngIf="selectedRole">
      <!-- Role badge + back button -->
      <div style="display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #EFF6FF; border-radius: 10px; margin-bottom: 20px; border: 1px solid #DBEAFE;">
        <button (click)="selectedRole = null" style="background: none; border: none; cursor: pointer; font-size: 18px; color: #64748B; padding: 0; line-height: 1;">‹</button>
        <div style="font-size: 20px;">{{ getSelectedRole()?.icon }}</div>
        <div>
          <div style="font-size: 13px; font-weight: 700; color: #1B2A4A;">{{ getSelectedRole()?.label }} Portal</div>
          <div style="font-size: 11px; color: #64748B;">{{ getSelectedRole()?.description }}</div>
        </div>
      </div>

      <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" [(ngModel)]="email" placeholder="Enter your email" (keyup.enter)="login()" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="password" placeholder="Enter your password" (keyup.enter)="login()" />
      </div>

      <button class="btn btn-primary"
              style="width: 100%; justify-content: center; padding: 13px; font-size: 15px;"
              (click)="login()" [disabled]="loading">
        <span *ngIf="loading">⏳ Signing in...</span>
        <span *ngIf="!loading">🔐 Sign in as {{ getSelectedRole()?.label }}</span>
      </button>
    </div>

  </div>
</div>
