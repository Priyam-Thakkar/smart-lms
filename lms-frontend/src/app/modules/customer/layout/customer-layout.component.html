<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">👤</div>
      <div><div class="logo-text">Smart LMS</div><div class="logo-sub">Customer Portal</div></div>
    </div>
    <nav class="sidebar-nav">
      <div *ngFor="let item of navItems" class="nav-item" [class.active]="isActive(item.route)" (click)="navigate(item.route)">
        <span class="nav-icon">{{ item.icon }}</span>{{ item.label }}
      </div>
    </nav>
    <div style="padding: 16px; border-top: 1px solid rgba(255,255,255,0.1);">
      <div class="nav-item" (click)="logout()" style="color: rgba(255,255,255,0.6);">
        <span class="nav-icon">🚪</span> Logout
      </div>
    </div>
  </aside>
  <div class="main-content">
    <header class="navbar">
      <div class="navbar-left"><div class="page-title">Customer Portal</div></div>
      <div class="navbar-right">
        <button class="btn btn-icon" (click)="navigate('/customer/notifications')" style="position: relative; background: #F4F6FA; border: 1px solid #E2E8F0;">
          🔔
          <span *ngIf="unreadCount > 0" style="position: absolute; top: -4px; right: -4px; background: #DC2626; color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: 700;">{{ unreadCount }}</span>
        </button>
        <div style="display: flex; align-items: center; gap: 10px; cursor: pointer;" (click)="navigate('/customer/profile')">
          <div style="width: 34px; height: 34px; border-radius: 50%; background: #1B2A4A; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 13px;">{{ user?.name?.charAt(0)?.toUpperCase() }}</div>
          <div><div style="font-weight: 600; font-size: 13px;">{{ user?.name }}</div><div style="font-size: 11px; color: #64748B;">Customer</div></div>
        </div>
      </div>
    </header>
    <main class="page-content"><router-outlet></router-outlet></main>
  </div>
</div>
